# ── Data ──────────────────────────────────────────────────────────────────────
LR_path: ./custom_dataset/hr_valid_LR_x4
GT_path: ./custom_dataset/hr_valid_HR
in_memory: true
num_workers: 0

# ── Model ─────────────────────────────────────────────────────────────────────
res_num: 16       # Number of residual blocks in the generator
scale: 4          # Super-resolution upscaling factor
patch_size: 24    # LR patch size used during training

# ── Training ──────────────────────────────────────────────────────────────────
batch_size: 16
pre_train_epoch: 8000    # SRResNet pre-training epochs (L2 loss only)
fine_train_epoch: 4000   # SRGAN fine-tuning epochs (perceptual + adversarial)
lr: 1.0e-4
lr_step_size: 2000       # LR scheduler step size (fine-tune phase)
lr_gamma: 0.1            # LR scheduler decay factor

# ── Loss coefficients ─────────────────────────────────────────────────────────
L2_coeff: 1.0
adv_coeff: 1.0e-3
tv_loss_coeff: 0.0
vgg_rescale_coeff: 0.006
feat_layer: relu5_4      # VGG19 layer used for perceptual loss

# ── Resume / fine-tuning ──────────────────────────────────────────────────────
fine_tuning: false
generator_path: null     # Path to a checkpoint (.pt) to load

# ── Mode ──────────────────────────────────────────────────────────────────────
mode: train              # train | test | test_only

# ── Output directories ────────────────────────────────────────────────────────
checkpoint_dir: ./checkpoints
log_dir: ./logs
result_dir: ./result

# ── Logging / saving intervals ────────────────────────────────────────────────
log_interval: 2                # Print/log every N epochs
checkpoint_interval: 500       # Save SRGAN checkpoint every N fine-tune epochs
pre_checkpoint_interval: 800   # Save SRResNet checkpoint every N pre-train epochs
